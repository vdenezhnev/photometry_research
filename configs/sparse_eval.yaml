# Sparse SfM через PyCOLMAP (Google Colab)
#
# Узкое место — matching при большом числе кадров (fps_30/60 на длинном ролике).
# sequential + max_images дают быстрый пробный прогон.

pycolmap:
  device: cuda
  # exhaustive = O(N²) пар, только для очень маленьких наборов
  matcher: sequential
  # Лимит кадров на один sparse-прогон (равномерная выборка)
  max_images: 120
  extraction_options:
    max_image_size: 1600
    sift:
      max_num_features: 2048
  matching_options: {}
  mapper_options: {}

success_criteria:
  min_registered_images_ratio: 0.6
  min_sparse_points: 500
  min_mean_track_length: 3.0

workspace_root: results/workspaces
top_k_fps_modes: 3

export:
  glb: true
  glb_filename: sparse_pointcloud.glb
  master_log: true
  master_log_xlsx: results/task2_sparse_eval/all_runs_log.xlsx

gpu_monitor:
  enabled: true
  sample_interval_sec: 1.0
  active_util_threshold: 5.0

# Dense MVS (CUDA): undistort → patch_match_stereo → stereo_fusion
# Запуск: python -m adaptive_sampling.sparse_eval.fused --video <slug>
dense:
  enabled: false
  results_subdir: task2_sparse_eval
  fused_ply_filename: fused.ply
  fused_glb_filename: fused.glb
  export_glb: true
  output_type: ply
  patch_match_options:
    filter: true
