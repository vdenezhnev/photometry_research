# Sparse SfM через PyCOLMAP (Google Colab)
#
# Узкое место — matching при большом числе кадров (fps_30/60 на длинном ролике).
# sequential + max_images дают быстрый пробный прогон.

pycolmap:
  device: cuda
  # exhaustive = O(N²) пар, только для очень маленьких наборов
  matcher: sequential
  # Лимит кадров на один sparse-прогон (равномерная выборка)
  max_images: 120
  extraction_options:
    max_image_size: 1600
    sift:
      max_num_features: 2048
  matching_options: {}
  mapper_options: {}

success_criteria:
  min_registered_images_ratio: 0.6
  min_sparse_points: 500
  min_mean_track_length: 3.0

workspace_root: results/workspaces
top_k_fps_modes: 3
